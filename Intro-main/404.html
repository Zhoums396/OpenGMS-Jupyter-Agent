<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenGeoLab Jupyter</title>
    <script>
      ;(() => {
        const base = '%BASE_URL%'
        const normalizedBase = base.endsWith('/') ? base : `${base}/`
        const basePath = new URL(normalizedBase, window.location.origin).pathname
        const path = window.location.pathname
        const relativePath = path.startsWith(basePath)
          ? `/${path.slice(basePath.length)}`
          : path
        const redirectPath = `${relativePath}${window.location.search}${window.location.hash}`
        const target = relativePath.startsWith('/docs') ? `${basePath}docs/` : basePath

        window.location.replace(`${target}?redirect=${encodeURIComponent(redirectPath)}`)
      })()
    </script>
  </head>
  <body></body>
</html>

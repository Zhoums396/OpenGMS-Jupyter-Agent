name: Deploy Intro Site to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - 'Intro-main/**'
      - '.github/workflows/intro-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Intro-main

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: Intro-main/package-lock.json

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_BASE_PATH: /OpenGMS-Jupyter-Agent/

      - name: Clean macOS metadata
        run: |
          find dist -name .DS_Store -delete
          rm -f dist/safari.mp4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: Intro-main/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
